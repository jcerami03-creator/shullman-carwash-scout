<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shullman Car Wash Knowledge Base</title>
    <link rel="stylesheet" href="styles.css?v=26" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="app-header">
          <div class="brand-block">
            <div class="brand-mark">SW</div>
            <div>
              <h1>Shullman Car Wash</h1>
              <p>Private acquisition intelligence for car wash operators, sites, and historical deal evidence.</p>
            </div>
          </div>
          <button id="documentLibraryBtn" class="ghost library-btn" type="button">Document Library</button>
        </header>

        <section class="search-panel" aria-label="Car wash knowledge search">
          <div class="query-card">
            <div class="query-label">
              <span>Simple, searchable.</span>
              <span id="voiceStatus" class="voice-status">Voice ready</span>
            </div>
            <div class="table-search" aria-label="Searchable deal columns">
              <label>
                <span>Year</span>
                <select id="yearInput" autocomplete="off">
                  <option value="">Any</option>
                </select>
              </label>
              <label>
                <span>State</span>
                <select id="marketInput" autocomplete="off">
                  <option value="">Any</option>
                </select>
              </label>
              <label>
                <span>Asking Price</span>
                <input id="askingPriceInput" type="search" placeholder="$5.2M" autocomplete="off" />
              </label>
              <label>
                <span>Sales</span>
                <input id="salesInput" type="search" placeholder="$2.0M" autocomplete="off" />
              </label>
              <label>
                <span>EBITDA</span>
                <input id="ebitdaInput" type="search" placeholder="$610K" autocomplete="off" />
              </label>
              <label>
                <span>Cars/Yr</span>
                <input id="carsInput" type="search" placeholder="120,000" autocomplete="off" />
              </label>
              <label>
                <span>Acres</span>
                <input id="acresInput" type="search" placeholder="1.05" autocomplete="off" />
              </label>
              <label>
                <span>Note</span>
                <textarea id="noteInput" placeholder="Type or speak a question, note, or phrase: moats, trends, great acquisitions..." autocomplete="off"></textarea>
              </label>
              <div class="table-actions">
                <button id="voiceBtn" type="button" class="ghost" title="Speak search">Speak</button>
                <button id="searchBtn" type="button">Search</button>
              </div>
            </div>
          </div>

          <section class="results-list" aria-label="Search results">
            <div class="section-heading">
              <h2>Screened Opportunities</h2>
              <span id="resultCount">0 shown</span>
            </div>
            <div id="results"></div>
          </section>
        </section>
      </section>
    </main>

    <div id="recordModal" class="modal-shell" hidden>
      <button id="modalBackdrop" class="modal-backdrop" type="button" aria-label="Close details"></button>
      <section class="record-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <div>
            <span class="modal-kicker">Deal Review</span>
            <h2 id="modalTitle">Selected Record</h2>
          </div>
          <button id="closeModalBtn" type="button" class="close-btn" aria-label="Close details">x</button>
        </div>
        <div id="detailContent"></div>
      </section>
    </div>

    <div id="libraryModal" class="modal-shell" hidden>
      <button id="libraryBackdrop" class="modal-backdrop" type="button" aria-label="Close document library"></button>
      <section class="record-modal library-modal" role="dialog" aria-modal="true" aria-labelledby="libraryTitle">
        <div class="modal-header">
          <div>
            <span class="modal-kicker">Source Files</span>
            <h2 id="libraryTitle">Document Library</h2>
          </div>
          <button id="closeLibraryBtn" type="button" class="close-btn" aria-label="Close document library">x</button>
        </div>
        <div id="libraryContent"></div>
      </section>
    </div>

    <script src="generated/carwash_records.js?v=23"></script>
    <script src="generated/document_library.js?v=4"></script>
    <script src="app.js?v=53"></script>
  </body>
</html>

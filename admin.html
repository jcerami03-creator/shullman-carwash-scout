<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scout Admin Upload</title>
    <link rel="stylesheet" href="styles.css?v=28" />
  </head>
  <body>
    <main class="admin-shell">
      <section class="admin-panel">
        <div class="admin-head">
          <a href="/">Back to Scout</a>
          <span>Admin Upload</span>
        </div>
        <h1>Add New Source Files</h1>
        <p>Upload photos, screenshots, scans, PDFs, or documents from a phone or computer. New uploads appear in the Document Library after the upload finishes.</p>

        <form id="uploadForm" class="upload-card">
          <label class="drop-zone">
            <span>Choose files</span>
            <strong>Photos, PDFs, scans, or screenshots</strong>
            <input id="uploadInput" name="files" type="file" accept="image/*,.pdf,.txt,.csv,.json" multiple />
          </label>
          <button id="uploadButton" type="submit">Upload Files</button>
          <p id="uploadStatus" class="upload-status">Ready for upload.</p>
        </form>

        <section class="admin-list-block">
          <div class="section-heading">
            <h2>Uploaded Files</h2>
            <span id="uploadCount">0 files</span>
          </div>
          <div id="uploadList" class="upload-list"></div>
        </section>
      </section>
    </main>

    <script src="admin.js?v=1"></script>
  </body>
</html>
